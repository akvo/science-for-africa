services:

  nginx:
    image: soa-prod-nginx
    build: ./nginx
    ports:
      - 80:80
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

  frontend:
    image: soa-prod-frontend
    build: ./frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${BACKEND_URL:-http://localhost/cms/api}

  backend:
    image: soa-prod-backend
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://localhost/cms/api}
      APP_KEYS: ${APP_KEYS:-mAzXoQi1qI3PzEhF1MNWPA==,dEkYXLPUuSlC26STB0ZyKA==}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-Lniabeo/mh7ynqF/GTfpOw==}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-Hr+r0OSOTgUzfce6q9/AvA==}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-95PYtBD/vlf9x0fB76N/sw==}
      JWT_SECRET: ${JWT_SECRET:-T+8DOhQmklZ+TH7ihClOKg==}
      DATABASE_CLIENT: ${DATABASE_CLIENT:-postgres}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-science_for_africa}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-akvo}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      EMAIL_CONFIRMATION_URL: ${EMAIL_CONFIRMATION_URL:-http://localhost/auth/verify-email}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:-http://localhost/auth/reset-password}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GCS_SERVICE_ACCOUNT: ${GCS_SERVICE_ACCOUNT:-{}}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GCS_BASE_PATH: ${GCS_BASE_PATH:-}
      GCS_BASE_URL: ${GCS_BASE_URL:-}
      GCS_PUBLIC_FILES: ${GCS_PUBLIC_FILES:-}
      GCS_UNIFORM: ${GCS_UNIFORM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:1337/api}

  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-akvo} -d ${DATABASE_NAME:-science_for_africa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: akvo
      POSTGRES_DB: ${DATABASE_NAME:-science_for_africa}

  pgadmin:
    image: dpage/pgadmin4:8
    restart: always
    volumes:
      - ./pgadmin4/servers.json:/pgadmin4/servers.json
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - 5050:5050
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGADMIN_LISTEN_PORT=5050
      - PGADMIN_DEFAULT_EMAIL=dev@akvo.org
      - PGADMIN_DEFAULT_PASSWORD=password

  mailpit:
    image: axllent/mailpit:v1.21
    restart: unless-stopped
    ports:
      - 8025:8025
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  pg-data:
  pgadmin-data:
